name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: Version to prepare
        required: true
      channel:
        description: Release channel
        type: choice
        options:
          - stable
          - beta
          - nightly
        default: beta
      publish:
        description: Publish GitHub Release
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - run: npm ci
      - run: npm run build
      - run: npm run tauri:build
      - uses: actions/upload-artifact@v4
        with:
          name: onstell-windows-dev
          path: |
            apps/desktop/src-tauri/target/release/bundle/**/*

  build-linux-x64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Tauri Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - run: npm ci
      - run: npm run build
      - run: npm run tauri:build
      - uses: actions/upload-artifact@v4
        with:
          name: onstell-linux-x64-dev
          path: |
            apps/desktop/src-tauri/target/release/bundle/**/*

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - run: npm ci
      - run: npm run build
      - run: npm run tauri:build
      - uses: actions/upload-artifact@v4
        with:
          name: onstell-macos-dev
          path: |
            apps/desktop/src-tauri/target/release/bundle/**/*

  release-plan:
    runs-on: ubuntu-latest
    needs:
      - build-windows
      - build-linux-x64
      - build-macos
    steps:
      - uses: actions/checkout@v4
      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
            CHANNEL="${{ inputs.channel }}"
            PUBLISH="${{ inputs.publish }}"
          else
            VERSION="${GITHUB_REF_NAME}"
            CHANNEL="stable"
            PUBLISH="true"
            if [[ "$VERSION" == *"-beta."* ]]; then CHANNEL="beta"; fi
            if [[ "$VERSION" == *"-nightly"* ]]; then CHANNEL="nightly"; fi
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "channel=$CHANNEL" >> "$GITHUB_OUTPUT"
          echo "publish=$PUBLISH" >> "$GITHUB_OUTPUT"
      - name: Show planned release assets
        shell: bash
        run: |
          mkdir -p dist
          if [ -f "docs/releases/${{ steps.meta.outputs.version }}.md" ]; then
            cp "docs/releases/${{ steps.meta.outputs.version }}.md" dist/RELEASE-NOTES.md
          else
            cat > dist/RELEASE-NOTES.md <<'NOTES'
          # Onstell development release

          This is an early development release for smoke testing the native Onstell desktop shell.

          This is not a working KVM release yet. Routing, capture, transport, and clipboard behavior remain simulated or design-only unless the release notes say otherwise.
          NOTES
          fi
          cp packaging/release-assets.json dist/release-assets.json
          ls -la dist
      - uses: actions/upload-artifact@v4
        with:
          name: onstell-release-plan
          path: dist/*
      - uses: actions/download-artifact@v4
        with:
          path: release-artifacts
      - name: Stage release package files
        shell: bash
        run: |
          mkdir -p dist/assets
          find release-artifacts -type f \( \
            -name "*.exe" -o \
            -name "*.msi" -o \
            -name "*.dmg" -o \
            -name "*.AppImage" -o \
            -name "*.deb" -o \
            -name "*.rpm" \
          \) -print -exec cp {} dist/assets/ \;
          (cd dist && sha256sum assets/* > SHA256SUMS.txt)
          ls -la dist dist/assets
      - name: Create draft GitHub Release
        if: steps.meta.outputs.publish == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.version }}
          name: Onstell ${{ steps.meta.outputs.version }}
          body_path: dist/RELEASE-NOTES.md
          draft: true
          prerelease: ${{ steps.meta.outputs.channel != 'stable' }}
          files: |
            dist/RELEASE-NOTES.md
            dist/SHA256SUMS.txt
            dist/release-assets.json
            dist/assets/*
