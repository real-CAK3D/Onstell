<div id="onstell-prototype">
  <style>
    #onstell-prototype {
      --bg: #090816;
      --panel: rgba(28, 24, 48, .72);
      --panel-strong: rgba(35, 30, 62, .88);
      --text: #f5f2ff;
      --muted: #c9c1df;
      --purple: #9b6cff;
      --cyan: #35d6ff;
      --rose: #ff6aa9;
      --amber: #ffd166;
      --widget-opacity: .9;
      --idle-opacity: .6;
      --hover-opacity: .95;
      min-height: 560px;
      color: var(--text);
      font-family: "Segoe UI", Inter, system-ui, sans-serif;
      background:
        radial-gradient(circle at 18% 15%, rgba(155, 108, 255, .28), transparent 30%),
        radial-gradient(circle at 86% 10%, rgba(53, 214, 255, .2), transparent 28%),
        radial-gradient(circle at 76% 88%, rgba(255, 106, 169, .18), transparent 30%),
        var(--bg);
      border-radius: 12px;
      padding: 24px;
      box-sizing: border-box;
    }

    #onstell-prototype * {
      box-sizing: border-box;
    }

    #onstell-prototype .desktop {
      position: relative;
      min-height: 512px;
      border: 1px solid rgba(255, 255, 255, .12);
      border-radius: 10px;
      overflow: hidden;
      background:
        linear-gradient(rgba(255, 255, 255, .055) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, .045) 1px, transparent 1px);
      background-size: 36px 36px;
    }

    #onstell-prototype .tray {
      position: absolute;
      left: 24px;
      top: 24px;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 12px;
      color: var(--muted);
      border: 1px solid rgba(255, 255, 255, .14);
      border-radius: 999px;
      background: rgba(255, 255, 255, .07);
      backdrop-filter: blur(18px);
    }

    #onstell-prototype .widget {
      position: absolute;
      left: 42px;
      bottom: 56px;
      width: min(430px, calc(100% - 84px));
      opacity: var(--widget-opacity);
      border: 1px solid rgba(185, 155, 255, .5);
      border-radius: 28px;
      background:
        linear-gradient(135deg, rgba(255, 255, 255, .18), transparent 32%),
        radial-gradient(circle at 18% 8%, rgba(155, 108, 255, .34), transparent 44%),
        radial-gradient(circle at 95% 18%, rgba(53, 214, 255, .22), transparent 38%),
        linear-gradient(145deg, var(--panel-strong), var(--panel));
      box-shadow:
        0 24px 80px rgba(0, 0, 0, .44),
        0 0 52px rgba(155, 108, 255, .24),
        inset 0 1px 0 rgba(255, 255, 255, .24);
      backdrop-filter: blur(26px) saturate(1.45);
      transition: opacity 150ms ease, transform 150ms ease;
    }

    #onstell-prototype .widget[data-idle="true"] {
      opacity: var(--idle-opacity);
    }

    #onstell-prototype .widget:hover,
    #onstell-prototype .widget[data-menu-open="true"] {
      opacity: var(--hover-opacity);
      transform: translateY(-2px);
    }

    #onstell-prototype .main-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px;
      cursor: grab;
    }

    #onstell-prototype .widget[data-locked="true"] .main-row {
      cursor: default;
    }

    #onstell-prototype .logo {
      width: 44px;
      height: 44px;
      border-radius: 17px;
      display: grid;
      place-items: center;
      background: conic-gradient(from 220deg, var(--purple), var(--cyan), var(--rose), var(--amber), var(--purple));
      box-shadow: 0 0 28px rgba(155, 108, 255, .4);
      font-weight: 700;
    }

    #onstell-prototype .copy {
      min-width: 0;
      flex: 1 1 auto;
    }

    #onstell-prototype .eyebrow,
    #onstell-prototype .subline,
    #onstell-prototype .label {
      color: var(--muted);
      font-size: 12px;
    }

    #onstell-prototype .eyebrow {
      display: flex;
      align-items: center;
      gap: 7px;
      margin-bottom: 5px;
    }

    #onstell-prototype .dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: var(--amber);
      box-shadow: 0 0 14px rgba(255, 209, 102, .7);
    }

    #onstell-prototype .title {
      font-weight: 600;
      overflow-wrap: anywhere;
    }

    #onstell-prototype .subline {
      margin-top: 3px;
      overflow-wrap: anywhere;
    }

    #onstell-prototype .actions {
      display: flex;
      align-items: center;
      gap: 8px;
      opacity: 0;
      max-width: 0;
      overflow: hidden;
      transition: opacity 150ms ease, max-width 150ms ease;
    }

    #onstell-prototype .widget:hover .actions,
    #onstell-prototype .widget[data-menu-open="true"] .actions {
      opacity: 1;
      max-width: 190px;
    }

    #onstell-prototype button {
      color: var(--text);
      font: inherit;
      border: 1px solid rgba(255, 255, 255, .16);
      background: rgba(255, 255, 255, .09);
      cursor: pointer;
      backdrop-filter: blur(14px);
    }

    #onstell-prototype .pill {
      border-radius: 999px;
      padding: 7px 10px;
    }

    #onstell-prototype .icon {
      width: 34px;
      height: 34px;
      border-radius: 999px;
    }

    #onstell-prototype .metrics {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      padding: 0 16px 16px;
    }

    #onstell-prototype .metric {
      min-width: 0;
      padding: 9px 10px;
      border: 1px solid rgba(255, 255, 255, .12);
      border-radius: 16px;
      background: rgba(255, 255, 255, .06);
    }

    #onstell-prototype .value {
      margin-top: 3px;
      font-weight: 600;
      overflow-wrap: anywhere;
    }

    #onstell-prototype .settings {
      position: absolute;
      top: 64px;
      right: 12px;
      width: min(330px, calc(100% - 24px));
      display: none;
      padding: 14px;
      border: 1px solid rgba(185, 155, 255, .42);
      border-radius: 22px;
      background: linear-gradient(145deg, rgba(37, 31, 66, .96), rgba(25, 21, 46, .88));
      box-shadow: 0 22px 70px rgba(0, 0, 0, .48), inset 0 1px 0 rgba(255, 255, 255, .18);
      backdrop-filter: blur(28px) saturate(1.5);
      z-index: 2;
    }

    #onstell-prototype .widget[data-menu-open="true"] .settings {
      display: block;
    }

    #onstell-prototype .settings-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 12px;
    }

    #onstell-prototype .slider-row {
      display: grid;
      grid-template-columns: 84px 1fr 42px;
      align-items: center;
      gap: 10px;
      margin: 9px 0;
    }

    #onstell-prototype input[type="range"],
    #onstell-prototype input[type="checkbox"] {
      accent-color: var(--purple);
    }

    #onstell-prototype input[type="range"] {
      width: 100%;
    }

    #onstell-prototype .mode-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin: 12px 0;
    }

    #onstell-prototype .mode-grid button[aria-pressed="true"] {
      color: #100a20;
      background: linear-gradient(135deg, var(--purple), var(--cyan));
    }

    #onstell-prototype .toggle {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin: 8px 0;
    }

    #onstell-prototype .layout {
      position: absolute;
      top: 28px;
      right: 28px;
      width: min(300px, calc(100% - 56px));
      display: grid;
      justify-items: center;
      gap: 10px;
      pointer-events: none;
    }

    #onstell-prototype .display {
      min-width: 110px;
      padding: 10px;
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, .16);
      background: rgba(255, 255, 255, .075);
      backdrop-filter: blur(12px);
    }

    #onstell-prototype .display.primary {
      border-color: rgba(155, 108, 255, .72);
      box-shadow: 0 0 30px rgba(155, 108, 255, .22);
    }

    @media (max-width: 560px) {
      #onstell-prototype {
        padding: 12px;
      }

      #onstell-prototype .desktop {
        min-height: 640px;
      }

      #onstell-prototype .widget {
        left: 14px;
        right: 14px;
        bottom: 28px;
        width: auto;
      }

      #onstell-prototype .metrics,
      #onstell-prototype .mode-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>

  <div class="desktop">
    <div class="tray">Hidden icons <strong>O</strong></div>

    <div class="layout" aria-label="Physical display layout preview">
      <div class="display primary"><strong>Main PC</strong><br><span class="label">Display 1</span></div>
      <div class="display"><strong>Raspberry Pi</strong><br><span class="label">Display 2</span></div>
      <div class="display"><strong>HP Laptop</strong><br><span class="label">Unavailable</span></div>
    </div>

    <section class="widget" data-menu-open="true" data-locked="false" data-idle="false" aria-label="Onstell floating widget">
      <div class="main-row">
        <div class="logo" aria-hidden="true">O</div>
        <div class="copy">
          <div class="eyebrow"><span class="dot"></span>Device Desktop mode</div>
          <div class="title">Onstell</div>
          <div class="subline">Raspberry Pi active - layout restored</div>
        </div>
        <div class="actions">
          <button class="pill" type="button">Enabled</button>
          <button class="icon" type="button" aria-label="Disconnect">X</button>
          <button class="icon" type="button" aria-label="Open widget settings" data-settings>Cog</button>
        </div>
      </div>

      <div class="metrics">
        <div class="metric"><span class="label">Profile</span><div class="value">Desk - Laptop Closed</div></div>
        <div class="metric"><span class="label">Latency</span><div class="value">3 ms</div></div>
        <div class="metric"><span class="label">Layer</span><div class="value" data-layer-label>Always on top</div></div>
      </div>

      <div class="settings" role="dialog" aria-label="Quick widget settings">
        <div class="settings-head">
          <strong>Quick settings</strong>
          <button class="icon" type="button" data-close aria-label="Close settings">X</button>
        </div>
        <label class="slider-row"><span class="label">Widget</span><input type="range" min="20" max="100" value="90" data-opacity="--widget-opacity" data-value="widget-value"><span class="label" id="widget-value">90%</span></label>
        <label class="slider-row"><span class="label">Idle</span><input type="range" min="20" max="100" value="60" data-opacity="--idle-opacity" data-value="idle-value"><span class="label" id="idle-value">60%</span></label>
        <label class="slider-row"><span class="label">Hover</span><input type="range" min="20" max="100" value="95" data-opacity="--hover-opacity" data-value="hover-value"><span class="label" id="hover-value">95%</span></label>

        <div class="mode-grid">
          <button class="pill" type="button" aria-pressed="true" data-layer="Always on top">Always on top</button>
          <button class="pill" type="button" aria-pressed="false" data-layer="Normal level">Normal level</button>
          <button class="pill" type="button" aria-pressed="false" data-layer="Behind windows">Behind windows</button>
          <button class="pill" type="button" aria-pressed="false" data-layer="Summoned only">Summoned only</button>
        </div>

        <label class="toggle label">Lock widget position <input type="checkbox" data-lock></label>
        <label class="toggle label">Remember widget position <input type="checkbox" checked></label>
        <label class="toggle label">Snap to screen edge <input type="checkbox" checked></label>
        <label class="toggle label">Hide during full-screen apps <input type="checkbox" checked></label>
      </div>
    </section>
  </div>

  <script>
    (() => {
      const root = document.getElementById("onstell-prototype");
      const widget = root.querySelector(".widget");
      const layerLabel = root.querySelector("[data-layer-label]");

      root.querySelector("[data-settings]").addEventListener("click", () => {
        widget.dataset.menuOpen = widget.dataset.menuOpen === "true" ? "false" : "true";
      });

      root.querySelector("[data-close]").addEventListener("click", () => {
        widget.dataset.menuOpen = "false";
      });

      root.querySelector("[data-lock]").addEventListener("change", (event) => {
        widget.dataset.locked = event.target.checked ? "true" : "false";
      });

      root.querySelectorAll("[data-opacity]").forEach((slider) => {
        const value = root.querySelector(`#${slider.dataset.value}`);
        const update = () => {
          root.style.setProperty(slider.dataset.opacity, (Number(slider.value) / 100).toFixed(2));
          value.textContent = `${slider.value}%`;
        };
        slider.addEventListener("input", update);
        update();
      });

      root.querySelectorAll("[data-layer]").forEach((button) => {
        button.addEventListener("click", () => {
          root.querySelectorAll("[data-layer]").forEach((peer) => peer.setAttribute("aria-pressed", "false"));
          button.setAttribute("aria-pressed", "true");
          layerLabel.textContent = button.dataset.layer;
        });
      });

      let dragging = false;
      let startX = 0;
      let startY = 0;
      let widgetX = 0;
      let widgetY = 0;

      widget.addEventListener("pointerdown", (event) => {
        if (widget.dataset.locked === "true" || event.target.closest("button, input, label")) return;
        dragging = true;
        const desktop = root.querySelector(".desktop").getBoundingClientRect();
        const rect = widget.getBoundingClientRect();
        startX = event.clientX;
        startY = event.clientY;
        widgetX = rect.left - desktop.left;
        widgetY = rect.top - desktop.top;
        widget.style.left = `${widgetX}px`;
        widget.style.top = `${widgetY}px`;
        widget.style.right = "auto";
        widget.style.bottom = "auto";
        widget.setPointerCapture(event.pointerId);
      });

      widget.addEventListener("pointermove", (event) => {
        if (!dragging) return;
        const desktop = root.querySelector(".desktop").getBoundingClientRect();
        const rect = widget.getBoundingClientRect();
        const x = Math.min(Math.max(8, widgetX + event.clientX - startX), desktop.width - rect.width - 8);
        const y = Math.min(Math.max(8, widgetY + event.clientY - startY), desktop.height - rect.height - 8);
        widget.style.left = `${x}px`;
        widget.style.top = `${y}px`;
      });

      widget.addEventListener("pointerup", (event) => {
        dragging = false;
        if (widget.hasPointerCapture(event.pointerId)) widget.releasePointerCapture(event.pointerId);
      });
    })();
  </script>
</div>
